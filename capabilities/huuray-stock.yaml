naftiko: 1.0.0-alpha2
info:
  label: Huuray API — Stock
  description: 'Huuray API — Stock. 1 operations. Lead operation: Used to check the current stock of a product. Self-contained
    Naftiko capability covering one Huuray business surface.'
  tags:
  - Huuray
  - Stock
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUURAY_API_KEY: HUURAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: huuray-stock
    baseUri: ''
    description: Huuray API — Stock business capability. Self-contained, no shared references.
    resources:
    - name: v4-Stock
      path: /v4/Stock
      operations:
      - name: post
        method: POST
        description: Used to check the current stock of a product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-API-NONCE
          in: header
          type: string
          description: A random value that can only be used once every 60 days. (max 50 characters)<br /><small>(this prevents
            your message from being re-transmitted, and thereby also
          required: true
        - name: X-API-HASH
          in: header
          type: string
          description: 'The SHA512 hash of a concatenated string containing the following: ( API-SECRET + NONCE ).<br /><small>(this
            is used to authenticate you)</small>'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.HUURAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: huuray-stock-rest
    port: 8080
    description: REST adapter for Huuray API — Stock. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v4/stock
      name: v4-stock
      description: REST surface for v4-Stock.
      operations:
      - method: POST
        name: post
        description: Used to check the current stock of a product
        call: huuray-stock.post
        with:
          X-API-NONCE: rest.X-API-NONCE
          X-API-HASH: rest.X-API-HASH
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: huuray-stock-mcp
    port: 9090
    transport: http
    description: MCP adapter for Huuray API — Stock. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: used-check-current-stock-product
      description: Used to check the current stock of a product
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: huuray-stock.post
      with:
        X-API-NONCE: tools.X-API-NONCE
        X-API-HASH: tools.X-API-HASH
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
