    port: 8080
    namespace: huuray-rest
    description: REST adapter for Huuray API.
    resources:
    - path: /v4/Balance
      name: get-v4-balance
      operations:
      - method: GET
        name: get-v4-balance
        description: Used to get available balances
        call: huuray.get-v4-balance
        outputParameters:
        - type: object
          mapping: $.
