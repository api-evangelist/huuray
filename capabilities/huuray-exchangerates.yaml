naftiko: 1.0.0-alpha2
info:
  label: Huuray API — ExchangeRates
  description: 'Huuray API — ExchangeRates. 1 operations. Lead operation: Used to retrieve current exchange rate data. Self-contained
    Naftiko capability covering one Huuray business surface.'
  tags:
  - Huuray
  - ExchangeRates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUURAY_API_KEY: HUURAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: huuray-exchangerates
    baseUri: ''
    description: Huuray API — ExchangeRates business capability. Self-contained, no shared references.
    resources:
    - name: v4-ExchangeRates
      path: /v4/ExchangeRates
      operations:
      - name: get
        method: GET
        description: Used to retrieve current exchange rate data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FromCurrency
          in: query
          type: string
        - name: ToCurrency
          in: query
          type: string
        - name: X-API-NONCE
          in: header
          type: string
          description: A random value that can only be used once every 60 days. (max 50 characters)<br /><small>(this prevents
            your message from being re-transmitted, and thereby also
          required: true
        - name: X-API-HASH
          in: header
          type: string
          description: 'The SHA512 hash of a concatenated string containing the following: ( API-SECRET + NONCE ).<br /><small>(this
            is used to authenticate you)</small>'
          required: true
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.HUURAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: huuray-exchangerates-rest
    port: 8080
    description: REST adapter for Huuray API — ExchangeRates. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v4/exchangerates
      name: v4-exchangerates
      description: REST surface for v4-ExchangeRates.
      operations:
      - method: GET
        name: get
        description: Used to retrieve current exchange rate data
        call: huuray-exchangerates.get
        with:
          FromCurrency: rest.FromCurrency
          ToCurrency: rest.ToCurrency
          X-API-NONCE: rest.X-API-NONCE
          X-API-HASH: rest.X-API-HASH
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: huuray-exchangerates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Huuray API — ExchangeRates. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: used-retrieve-current-exchange-rate
      description: Used to retrieve current exchange rate data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: huuray-exchangerates.get
      with:
        FromCurrency: tools.FromCurrency
        ToCurrency: tools.ToCurrency
        X-API-NONCE: tools.X-API-NONCE
        X-API-HASH: tools.X-API-HASH
      outputParameters:
      - type: object
        mapping: $.
