modified: '2026-04-28'
specificationVersion: '0.19'
apis:
  - aid: huuray:huuray-api
    name: Huuray Gift Card API
    description: >-
      The Huuray API enables B2B customers to offer global gift card purchasing
      and redemption services, providing access to a catalog of gift card
      brands across 170+ countries through a single integration. Endpoints
      cover balance checks, catalogue browsing, exchange rates, ordering,
      cancellation, resend, search, stock checks, and template management.
    humanURL: https://huuray.com/solutions/developers-gift-card-api/
    baseURL: https://api.huuray.com
    tags:
      - Gift Cards
      - Rewards
    properties:
      - type: Documentation
        url: https://huuray.com/solutions/developers-gift-card-api/
      - type: SwaggerUI
        url: https://api.huuray.com/swagger/index.html
      - type: OpenAPI
        url: openapi/huuray-openapi.yml
