aid: huuray
name: Huuray
description: >-
  Huuray is a global gift card API platform that enables businesses to offer
  gift card buying and redemption without leaving their website. The platform
  allows businesses to quickly and easily send gifts without having to manage
  multiple accounts.
url: >-
  https://raw.githubusercontent.com/api-evangelist/huuray/refs/heads/main/apis.yml
